name: Build KVideo APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 关键配置：全局指定工作目录为 android-tv
    defaults:
      run:
        working-directory: android-tv 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Force Generate Gradle Wrapper
        # 这一步会调用云端的全局 Gradle，为你自动补全缺失的 gradlew 和 jar 文件
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # 开始构建 APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KVideo-TV-Debug
          # 产物上传路径需要从仓库根目录开始算起
          path: android-tv/app/build/outputs/apk/debug/*.apk
