name: Build KVideo APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: android-tv 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Missing Wrapper Files
        # 使用 wget 直接从官方下载缺失的脚本和依赖包，绕过 Gradle 版本的兼容性检查
        run: |
          wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew
          mkdir -p gradle/wrapper
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build with Gradle
        # 此时会读取你项目自带的 gradle-wrapper.properties 去下载正确的旧版 Gradle 并编译
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KVideo-TV-Debug
          path: android-tv/app/build/outputs/apk/debug/*.apk
