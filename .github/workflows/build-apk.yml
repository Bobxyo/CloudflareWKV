name: Build KVideo APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: android-tv 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fix and Download Wrapper
        run: |
          # 强制重新下载对应版本的 Wrapper
          wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew
          mkdir -p gradle/wrapper
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build with Gradle
        # 使用 --no-daemon 模式在 Actions 环境下更稳定
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KVideo-TV-Debug
          path: android-tv/app/build/outputs/apk/debug/*.apk
